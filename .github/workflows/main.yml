name: Build Binaries

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: npm install
      - run: npx pkg app.mjs --targets node18-win-x64 --output dist/app.exe
      - uses: actions/upload-artifact@v3
        with:
          name: windows-binary
          path: dist/app.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: npm install
      - run: npx pkg app.mjs --targets node18-linux-x64 --output dist/app
      - uses: actions/upload-artifact@v3
        with:
          name: linux-binary
          path: dist/app

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: npm install
      - run: npx pkg app.mjs --targets node18-macos-x64 --output dist/app
      - uses: actions/upload-artifact@v3
